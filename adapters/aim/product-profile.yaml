product:
  name: aim

repo:
  build_systems:
    - make
    - dx-wrapper
  primary_languages:
    - c
    - c++
    - shell
    - markdown
  modules:
    - src
    - test/unit/gtest
    - script
    - config
  runtime_hints:
    - docker-via-dx
    - release-branch-rb_73
    - gitlab-merge-request
    - ims-browser
    - jira-rest
    - notebooklm-xsp
  test_frameworks:
    - gtest
  coverage_tool: gcov+measure_diff_cov
  commands:
    build: dx make
    test: dx tmdown -y && dx make gtest
    coverage: dx bash -c "cd /root/ofsrc/aim && bash skills/review/code-reviewer/scripts/measure_diff_cov.sh"

workflow:
  defaults:
    issue_tracker: jira
    review_channel: merge_request
    docs_channel: repo_markdown
    manual_workflow_required: true

runtime:
  artifact_workspace_root: agent/
  manual_workspace_root: generated/manual/

notes:
  - original AIM skills assume a Claude-era entrypoint through CLAUDE.md plus SessionStart hook injection
  - original artifacts were written under ../agent/prompt/<topic>/, but the regenerated draft normalizes them to agent/<topic>/
  - full manual publication still depends on a separate MANUAL repository and direct push to 7.3_main
